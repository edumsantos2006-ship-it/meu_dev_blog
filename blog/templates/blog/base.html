{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBlog</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'blog/css/style.css' %}">
</head>
<body class="bg-light d-fleax flex-column min-vh-100">
    <header>

        <nav class=" navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="{% url 'home' %}">🚀 DevBlog</a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'home' %}">Início</a>
                        </li>
                        {% for categoria in lista_categorias %}
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'categoria' categoria.id %}">{{categoria.nome}}</a>
                            </li>
                        {% endfor %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'sobre_nos' %}">Sobre</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'fale_conosco' %}">contato</a>
                    </ul>
                </div>
            </div>
        </nav>

    </header>

    <main class="container my-5">
        {%block content %}
        {% endblock %}
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0">© 2026 Desenvolvido pela Turma Python. Todos os direitos reservados</p>
    </footer>
</body>
</html>
